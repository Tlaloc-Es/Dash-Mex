target-version = "py311"
line-length = 100
indent-width = 4

exclude = [".git", ".venv", "__pycache__", "data", "dash_mex.egg-info"]

[lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[format]
quote-style = "single"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
docstring-code-format = true
